name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ghcr.io/gptcompany/spongebb:latest .

      - name: Deploy API
        run: |
          cd /media/sam/1TB/openbb_liquidity
          git pull --ff-only origin main
          LIQUIDITY_API_PORT=8002 docker compose up -d --build liquidity-api

      - name: Verify health
        run: |
          echo "Waiting for API to start..."
          sleep 10
          curl -sf http://localhost:8002/health || (echo "Health check failed!" && exit 1)
          echo "Deploy successful"
