# Docker Compose for Global Liquidity Monitor
# Services: liquidity-api, QuestDB (time-series), Redis (pub/sub + caching)
#
# Usage:
#   docker compose up -d                    # Start API with external QuestDB/Redis
#   docker compose --profile isolated up -d # Start all services (isolated)
#   docker compose --profile dev up -d      # Development mode with hot reload
#   docker compose --profile dashboard up -d liquidity-dashboard
#   docker compose --profile test run --rm liquidity-pytest
#   docker compose --profile test run --rm liquidity-playwright
#
# Port allocation strategy:
# - API: 8000 (configurable via LIQUIDITY_API_PORT)
# - Development: Use nautilus-questdb (9000/9009/8812) and nautilus-redis (6379)
# - Isolated testing: Use liquidity-* containers with alternate ports
#
# Default: Share existing NautilusTrader infrastructure (same QuestDB/Redis)
# Set profile=isolated to use dedicated containers

services:
  # ===========================================================================
  # Application Services
  # ===========================================================================

  liquidity-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: liquidity-api
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_API_PORT:-8000}:8000"
    environment:
      - LIQUIDITY_QUESTDB_HOST=${LIQUIDITY_QUESTDB_HOST:-localhost}
      - LIQUIDITY_QUESTDB_PORT=${LIQUIDITY_QUESTDB_PORT:-9009}
      - LIQUIDITY_QUESTDB_HTTP_PORT=${LIQUIDITY_QUESTDB_HTTP_PORT:-9000}
      - LIQUIDITY_REDIS_URL=${LIQUIDITY_REDIS_URL:-redis://localhost:6379}
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # API with isolated infrastructure (depends on local QuestDB/Redis)
  liquidity-api-isolated:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: liquidity-api-isolated
    profiles:
      - isolated
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_API_PORT:-8000}:8000"
    environment:
      # Use container names for isolated network
      - LIQUIDITY_QUESTDB_HOST=liquidity-questdb
      - LIQUIDITY_QUESTDB_PORT=9009
      - LIQUIDITY_QUESTDB_HTTP_PORT=9000
      - LIQUIDITY_REDIS_URL=redis://liquidity-redis:6379
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-INFO}
    depends_on:
      questdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # Development mode with hot reload
  liquidity-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: liquidity-api-dev
    profiles:
      - dev
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_API_PORT:-8000}:8000"
    environment:
      - LIQUIDITY_QUESTDB_HOST=${LIQUIDITY_QUESTDB_HOST:-localhost}
      - LIQUIDITY_QUESTDB_PORT=${LIQUIDITY_QUESTDB_PORT:-9009}
      - LIQUIDITY_QUESTDB_HTTP_PORT=${LIQUIDITY_QUESTDB_HTTP_PORT:-9000}
      - LIQUIDITY_REDIS_URL=${LIQUIDITY_REDIS_URL:-redis://localhost:6379}
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-DEBUG}
    volumes:
      - ./src:/app/src:ro  # Mount source for hot reload
    command: ["python", "-m", "uvicorn", "liquidity.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # Dashboard runtime (container-first workflow)
  liquidity-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: liquidity-dashboard
    profiles:
      - dashboard
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_DASHBOARD_PORT:-8050}:8050"
    environment:
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_EIA_API_KEY=${LIQUIDITY_EIA_API_KEY:-}
      - OPENBB_FRED_API_KEY=${OPENBB_FRED_API_KEY:-}
      - OPENBB_EIA_API_KEY=${OPENBB_EIA_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-INFO}
      - LIQUIDITY_DASHBOARD_FORCE_FALLBACK=${LIQUIDITY_DASHBOARD_FORCE_FALLBACK:-0}
      - LIQUIDITY_DASHBOARD_FIXED_NOW=${LIQUIDITY_DASHBOARD_FIXED_NOW:-}
    command: ["python", "-m", "liquidity.dashboard", "--host", "0.0.0.0", "--port", "8050"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # Dashboard development mode with hot reload
  liquidity-dashboard-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: liquidity-dashboard-dev
    profiles:
      - dev
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_DASHBOARD_PORT:-8050}:8050"
    environment:
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_EIA_API_KEY=${LIQUIDITY_EIA_API_KEY:-}
      - OPENBB_FRED_API_KEY=${OPENBB_FRED_API_KEY:-}
      - OPENBB_EIA_API_KEY=${OPENBB_EIA_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-DEBUG}
      - LIQUIDITY_DASHBOARD_FORCE_FALLBACK=${LIQUIDITY_DASHBOARD_FORCE_FALLBACK:-0}
      - LIQUIDITY_DASHBOARD_FIXED_NOW=${LIQUIDITY_DASHBOARD_FIXED_NOW:-}
    volumes:
      - ./src:/app/src:ro
    command: ["python", "-m", "liquidity.dashboard", "--host", "0.0.0.0", "--port", "8050", "--debug"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # Deterministic dashboard service used by visual regression tests
  liquidity-dashboard-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    profiles:
      - test
    environment:
      - LIQUIDITY_DASHBOARD_FORCE_FALLBACK=1
      - LIQUIDITY_DASHBOARD_FIXED_NOW=2026-02-20T00:00:00+00:00
      - PYTHONHASHSEED=0
    command: ["python", "-m", "liquidity.dashboard", "--host", "0.0.0.0", "--port", "8050"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      - liquidity-network

  # Runtime Python tests inside container (avoids sandbox /dev/urandom limits)
  liquidity-pytest:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runtime
    profiles:
      - test
    environment:
      - PYTHONHASHSEED=0
    volumes:
      - ./tests:/app/tests:ro
      - ./src:/app/src:ro
    command: ["python", "-m", "pytest", "tests/unit", "-q"]
    networks:
      - liquidity-network

  # Visual regression tests via Playwright (containerized)
  liquidity-playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    profiles:
      - test
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /work
    depends_on:
      liquidity-dashboard-test:
        condition: service_healthy
    environment:
      - CI=1
      - PLAYWRIGHT_SKIP_WEBSERVER=1
      - PLAYWRIGHT_BASE_URL=http://liquidity-dashboard-test:8050
    volumes:
      - ./:/work
    command: ["bash", "-lc", "npm ci && npm run test:visual"]
    networks:
      - liquidity-network

  # ===========================================================================
  # Infrastructure Services (isolated profile)
  # ===========================================================================

  questdb:
    image: questdb/questdb:latest
    container_name: liquidity-questdb
    profiles:
      - isolated
    ports:
      - "9002:9000"   # Web console & REST API (alt: 9002)
      - "9011:9009"   # ILP (InfluxDB Line Protocol) (alt: 9011)
      - "8814:8812"   # PostgreSQL wire protocol (alt: 8814)
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false
      - QDB_HTTP_MIN_ENABLED=false
      # ILP defaults to enabled
      # PostgreSQL wire protocol defaults to enabled
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - liquidity-network

  redis:
    image: redis:7-alpine
    container_name: liquidity-redis
    profiles:
      - isolated
    ports:
      - "6381:6379"   # Redis port (alt: 6381)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - liquidity-network

  # Prometheus (commented out - add when metrics needed)
  # prometheus:
  #   image: prom/prometheus:latest
  #   container_name: liquidity-prometheus
  #   ports:
  #     - "9090:9090"
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - prometheus_data:/prometheus
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'
  #     - '--storage.tsdb.path=/prometheus'
  #   healthcheck:
  #     test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #   restart: unless-stopped
  #   networks:
  #     - liquidity-network

volumes:
  questdb_data:
    name: liquidity-questdb-data
  redis_data:
    name: liquidity-redis-data
  # prometheus_data:
  #   name: liquidity-prometheus-data

networks:
  liquidity-network:
    name: liquidity-network
    driver: bridge
