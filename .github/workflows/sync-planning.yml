name: Sync Planning
"on":
  push:
    paths:
      - '.planning/**'
      - 'tasks.md'
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours for bidirectional sync

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PROJECT_PAT }}  # Need PAT for push back

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download sync scripts
        run: |
          mkdir -p .github/scripts
          curl -sL https://raw.githubusercontent.com/gptcompany/claude-config/main/scripts/github_sync_core.py -o .github/scripts/github_sync_core.py
          curl -sL https://raw.githubusercontent.com/gptcompany/claude-config/main/scripts/roadmaptoissues.py -o .github/scripts/roadmaptoissues.py

      - name: Debug token
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_PAT }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "ERROR: GH_PROJECT_PAT secret is empty!"
            exit 1
          fi
          echo "Token is set (masked)"
          gh api user --jq '.login' || echo "Cannot identify user"

      - name: Bidirectional Sync
        env:
          GH_TOKEN: ${{ secrets.GH_PROJECT_PAT }}
        run: |
          cd .github/scripts
          # Bidirectional: ROADMAP <-> GitHub Issues
          python roadmaptoissues.py --sync ../../.planning --auto-project --create-project

      - name: Commit ROADMAP changes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet .planning/ROADMAP.md; then
            echo "No changes to ROADMAP.md"
          else
            git add .planning/ROADMAP.md
            git commit -m "chore(sync): update ROADMAP from GitHub Issues [skip ci]"
            git push
          fi
