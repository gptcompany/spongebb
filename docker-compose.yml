# Docker Compose for SpongeBB (Global Liquidity Monitor)
# Services: spongebb-api, spongebb-workspace, QuestDB (time-series), Redis (pub/sub)
#
# Usage:
#   dotenvx run -- docker compose up -d          # Start API + Workspace (production)
#   docker compose --profile isolated up -d      # Start all services (isolated infra)
#   docker compose --profile dev up -d           # Development mode with hot reload
#   docker compose --profile dashboard up -d     # Dashboard only
#   docker compose --profile test run --rm liquidity-pytest
#   docker compose --profile test run --rm liquidity-playwright
#
# Always-on services (default profile, no --profile needed):
#   - spongebb-api      → port 8003 (FastAPI REST)
#   - spongebb-workspace → port 6900 (OpenBB Terminal Pro backend)
#
# Both use network_mode: host for direct access to QuestDB/Redis on host.
# Secrets injected via: dotenvx run -- docker compose up -d

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================================================
  # Always-On Production Services (default profile)
  # ===========================================================================

  liquidity-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: spongebb-api
    init: true
    network_mode: host
    restart: always
    stop_grace_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1g
    environment:
      - LIQUIDITY_QUESTDB_HOST=${LIQUIDITY_QUESTDB_HOST:-localhost}
      - LIQUIDITY_QUESTDB_PORT=${LIQUIDITY_QUESTDB_PORT:-9009}
      - LIQUIDITY_QUESTDB_HTTP_PORT=${LIQUIDITY_QUESTDB_HTTP_PORT:-9000}
      - LIQUIDITY_REDIS_URL=${LIQUIDITY_REDIS_URL:-redis://localhost:6379}
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - OPENBB_FRED_API_KEY=${OPENBB_FRED_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-INFO}
    command: ["python", "-m", "uvicorn", "liquidity.api:app", "--host", "0.0.0.0", "--port", "8003"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  liquidity-workspace:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: spongebb-workspace
    init: true
    network_mode: host
    restart: always
    stop_grace_period: 10s
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 512m
    command: >-
      openbb-api --app liquidity.openbb_ext.workspace_app:app
      --host 0.0.0.0 --port 6900
    environment:
      - LIQUIDITY_QUESTDB_HOST=${LIQUIDITY_QUESTDB_HOST:-localhost}
      - LIQUIDITY_QUESTDB_PORT=${LIQUIDITY_QUESTDB_PORT:-9009}
      - LIQUIDITY_QUESTDB_HTTP_PORT=${LIQUIDITY_QUESTDB_HTTP_PORT:-9000}
      - LIQUIDITY_REDIS_URL=${LIQUIDITY_REDIS_URL:-redis://localhost:6379}
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - OPENBB_FRED_API_KEY=${OPENBB_FRED_API_KEY:-}
      - LIQUIDITY_EIA_API_KEY=${LIQUIDITY_EIA_API_KEY:-}
      - OPENBB_EIA_API_KEY=${OPENBB_EIA_API_KEY:-}
      - LIQUIDITY_CF_ACCESS_ENABLED=${LIQUIDITY_CF_ACCESS_ENABLED:-false}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6900/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ===========================================================================
  # Profiled Services (dev, isolated, dashboard, test)
  # ===========================================================================

  # API with isolated infrastructure (depends on local QuestDB/Redis)
  liquidity-api-isolated:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: spongebb-api-isolated
    profiles:
      - isolated
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_API_PORT:-8003}:8000"
    environment:
      - LIQUIDITY_QUESTDB_HOST=liquidity-questdb
      - LIQUIDITY_QUESTDB_PORT=9009
      - LIQUIDITY_QUESTDB_HTTP_PORT=9000
      - LIQUIDITY_REDIS_URL=redis://liquidity-redis:6379
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-INFO}
    depends_on:
      questdb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # Development mode with hot reload
  liquidity-api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: spongebb-api-dev
    profiles:
      - dev
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_API_PORT:-8003}:8000"
    environment:
      - LIQUIDITY_QUESTDB_HOST=${LIQUIDITY_QUESTDB_HOST:-localhost}
      - LIQUIDITY_QUESTDB_PORT=${LIQUIDITY_QUESTDB_PORT:-9009}
      - LIQUIDITY_QUESTDB_HTTP_PORT=${LIQUIDITY_QUESTDB_HTTP_PORT:-9000}
      - LIQUIDITY_REDIS_URL=${LIQUIDITY_REDIS_URL:-redis://localhost:6379}
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-DEBUG}
    volumes:
      - ./src:/app/src:ro  # Mount source for hot reload
    command: ["python", "-m", "uvicorn", "liquidity.api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # Dashboard runtime (container-first workflow)
  liquidity-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ${LIQUIDITY_DASHBOARD_CONTAINER_NAME:-spongebb-dashboard}
    profiles:
      - dashboard
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_DASHBOARD_PORT:-8050}:8050"
    environment:
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_EIA_API_KEY=${LIQUIDITY_EIA_API_KEY:-}
      - OPENBB_FRED_API_KEY=${OPENBB_FRED_API_KEY:-}
      - OPENBB_EIA_API_KEY=${OPENBB_EIA_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-INFO}
      - LIQUIDITY_DASHBOARD_FORCE_FALLBACK=${LIQUIDITY_DASHBOARD_FORCE_FALLBACK:-0}
      - LIQUIDITY_DASHBOARD_FIXED_NOW=${LIQUIDITY_DASHBOARD_FIXED_NOW:-}
    command: ["python", "-m", "liquidity.dashboard", "--host", "0.0.0.0", "--port", "8050"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # Dashboard development mode with hot reload
  liquidity-dashboard-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: spongebb-dashboard-dev
    profiles:
      - dev
    restart: unless-stopped
    ports:
      - "${LIQUIDITY_DASHBOARD_PORT:-8050}:8050"
    environment:
      - LIQUIDITY_FRED_API_KEY=${LIQUIDITY_FRED_API_KEY:-}
      - LIQUIDITY_EIA_API_KEY=${LIQUIDITY_EIA_API_KEY:-}
      - OPENBB_FRED_API_KEY=${OPENBB_FRED_API_KEY:-}
      - OPENBB_EIA_API_KEY=${OPENBB_EIA_API_KEY:-}
      - LIQUIDITY_LOG_LEVEL=${LIQUIDITY_LOG_LEVEL:-DEBUG}
      - LIQUIDITY_DASHBOARD_FORCE_FALLBACK=${LIQUIDITY_DASHBOARD_FORCE_FALLBACK:-0}
      - LIQUIDITY_DASHBOARD_FIXED_NOW=${LIQUIDITY_DASHBOARD_FIXED_NOW:-}
    volumes:
      - ./src:/app/src:ro
    command: ["python", "-m", "liquidity.dashboard", "--host", "0.0.0.0", "--port", "8050", "--debug"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - liquidity-network

  # ===========================================================================
  # Test Services
  # ===========================================================================

  # Deterministic dashboard service used by visual regression tests
  liquidity-dashboard-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    profiles:
      - test
    environment:
      - LIQUIDITY_DASHBOARD_FORCE_FALLBACK=1
      - LIQUIDITY_DASHBOARD_FIXED_NOW=2026-02-20T00:00:00+00:00
      - PYTHONHASHSEED=0
    command: ["python", "-m", "liquidity.dashboard", "--host", "0.0.0.0", "--port", "8050"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050"]
      interval: 15s
      timeout: 10s
      retries: 6
      start_period: 20s
    networks:
      - liquidity-network

  # Runtime Python tests inside container (avoids sandbox /dev/urandom limits)
  liquidity-pytest:
    build:
      context: .
      dockerfile: Dockerfile
      target: test-runtime
    profiles:
      - test
    environment:
      - PYTHONHASHSEED=0
    volumes:
      - ./tests:/app/tests:ro
      - ./src:/app/src:ro
    command: ["python", "-m", "pytest", "tests/unit", "-q"]
    networks:
      - liquidity-network

  # Visual regression tests via Playwright (containerized)
  liquidity-playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    profiles:
      - test
    user: "${UID:-1000}:${GID:-1000}"
    working_dir: /work
    depends_on:
      liquidity-dashboard-test:
        condition: service_healthy
    environment:
      - CI=1
      - PLAYWRIGHT_SKIP_WEBSERVER=1
      - PLAYWRIGHT_BASE_URL=http://liquidity-dashboard-test:8050
    volumes:
      - ./:/work
    command: ["bash", "-lc", "npm ci && npm run test:visual"]
    networks:
      - liquidity-network

  # ===========================================================================
  # Infrastructure Services (isolated profile)
  # ===========================================================================

  questdb:
    image: questdb/questdb:latest
    container_name: spongebb-questdb
    profiles:
      - isolated
    ports:
      - "9002:9000"   # Web console & REST API (alt: 9002)
      - "9011:9009"   # ILP (InfluxDB Line Protocol) (alt: 9011)
      - "8814:8812"   # PostgreSQL wire protocol (alt: 8814)
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false
      - QDB_HTTP_MIN_ENABLED=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - liquidity-network

  redis:
    image: redis:7-alpine
    container_name: spongebb-redis
    profiles:
      - isolated
    ports:
      - "6381:6379"   # Redis port (alt: 6381)
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - liquidity-network

volumes:
  questdb_data:
    name: liquidity-questdb-data
  redis_data:
    name: liquidity-redis-data

networks:
  liquidity-network:
    name: liquidity-network
    driver: bridge
