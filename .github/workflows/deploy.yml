name: Core Deploy

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile"
      - "docker-compose.yml"
      - "Makefile"
      - "pyproject.toml"
      - "uv.lock"
      - "src/liquidity/**"
      - "scripts/*.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REPO_DIR: ${{ github.workspace }}
  DOTENV_FILE: /media/sam/1TB/.env
  DISCORD_WEBHOOK_SPONGEBB: ${{ secrets.DISCORD_WEBHOOK_SPONGEBB }}

jobs:
  deploy:
    runs-on: [self-hosted, Linux, X64, muletto]
    timeout-minutes: 30
    concurrency:
      group: core-deploy-${{ github.repository }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build and deploy services
        run: |
          set -euo pipefail
          cd "$REPO_DIR"
          dotenvx run -- docker compose build liquidity-api liquidity-workspace
          dotenvx run -- docker compose up -d liquidity-api liquidity-workspace

      - name: Wait for healthy services
        run: |
          set -euo pipefail

          wait_healthy() {
            local url="$1"
            local name="$2"
            local timeout_s="${3:-120}"
            local start
            start="$(date +%s)"
            while true; do
              if curl -fsS --max-time 5 "$url" >/dev/null 2>&1; then
                echo "OK  $name ($url)"
                return 0
              fi
              if [ $(( $(date +%s) - start )) -ge "$timeout_s" ]; then
                echo "TIMEOUT  $name ($url) after ${timeout_s}s"
                docker compose logs --tail=50 "$name" 2>&1 || true
                return 1
              fi
              sleep 3
            done
          }

          cd "$REPO_DIR"
          wait_healthy "http://localhost:8003/health" "liquidity-api" 120
          wait_healthy "http://localhost:6900/health" "liquidity-workspace" 120

      - name: Verify API response
        run: |
          curl -sf http://localhost:8003/health | python3 -c "
          import sys, json
          h = json.load(sys.stdin)
          assert h['status'] == 'healthy', f'Unhealthy: {h}'
          print(f'API: {h[\"status\"]}, QuestDB: {h[\"questdb_connected\"]}, Version: {h[\"version\"]}')
          "

      - name: Notify Discord on success
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          WEBHOOK="${DISCORD_WEBHOOK_SPONGEBB:-}"
          if [ -z "$WEBHOOK" ] && [ -f "$DOTENV_FILE" ]; then
            WEBHOOK="$(dotenvx get DISCORD_WEBHOOK_SPONGEBB -f "$DOTENV_FILE" 2>/dev/null || true)"
          fi
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_SPONGEBB missing; skipping success notification."
            exit 0
          fi
          payload=$(python3 -c 'import json, os; print(json.dumps({"content": f"✅ **spongebb deploy riuscito**\\nBranch: `{os.environ[\"GITHUB_REF_NAME\"]}`\\nCommit: `{os.environ[\"GITHUB_SHA\"]}`\\nAPI: http://localhost:8003/health\\nWorkspace: http://localhost:6900/health"}))')
          curl -fsSL -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Notify Discord on failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          WEBHOOK="${DISCORD_WEBHOOK_SPONGEBB:-}"
          if [ -z "$WEBHOOK" ] && [ -f "$DOTENV_FILE" ]; then
            WEBHOOK="$(dotenvx get DISCORD_WEBHOOK_SPONGEBB -f "$DOTENV_FILE" 2>/dev/null || true)"
          fi
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_SPONGEBB missing; skipping failure notification."
            exit 0
          fi
          payload=$(python3 -c 'import json, os; print(json.dumps({"content": f"🚨 **spongebb deploy fallito**\\nBranch: `{os.environ[\"GITHUB_REF_NAME\"]}`\\nCommit: `{os.environ[\"GITHUB_SHA\"]}`\\nWorkflow: {os.environ[\"GITHUB_SERVER_URL\"]}/{os.environ[\"GITHUB_REPOSITORY\"]}/actions/runs/{os.environ[\"GITHUB_RUN_ID\"]}"}))')
          curl -fsSL -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$payload"

      - name: Show deployment status
        if: always()
        run: |
          cd "$REPO_DIR"
          echo "=== Container Status ==="
          docker compose ps
          echo ""
          echo "=== Recent Logs (API, last 10) ==="
          docker compose logs --tail=10 liquidity-api 2>&1 || true
